<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <rect width="100" height="100" rx="20" fill="#6366f1" />
    <!-- Brain circuit icon -->
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <!-- Brain outline left -->
        <path d="M30 55 C20 55 18 45 22 40 C18 35 22 28 28 30 C28 24 34 20 40 23 C42 18 50 18 50 25" />
        <!-- Brain outline right -->
        <path d="M70 55 C80 55 82 45 78 40 C82 35 78 28 72 30 C72 24 66 20 60 23 C58 18 50 18 50 25" />
        <!-- Bottom -->
        <path d="M30 55 C30 62 36 68 50 68 C64 68 70 62 70 55" />
        <!-- Circuit lines -->
        <line x1="50" y1="68" x2="50" y2="78" />
        <line x1="42" y1="78" x2="58" y2="78" />
        <circle cx="42" cy="78" r="3" fill="#ffffff" />
        <circle cx="58" cy="78" r="3" fill="#ffffff" />
        <!-- Circuit nodes inside brain -->
        <circle cx="38" cy="40" r="3" fill="#a5b4fc" />
        <circle cx="50" cy="35" r="3" fill="#a5b4fc" />
        <circle cx="62" cy="40" r="3" fill="#a5b4fc" />
        <line x1="38" y1="40" x2="50" y2="35" />
        <line x1="50" y1="35" x2="62" y2="40" />
        <line x1="38" y1="40" x2="38" y2="52" />
        <line x1="50" y1="35" x2="50" y2="52" />
        <line x1="62" y1="40" x2="62" y2="52" />
        <circle cx="38" cy="52" r="3" fill="#a5b4fc" />
        <circle cx="50" cy="52" r="3" fill="#a5b4fc" />
        <circle cx="62" cy="52" r="3" fill="#a5b4fc" />
        <line x1="38" y1="52" x2="50" y2="52" />
        <line x1="50" y1="52" x2="62" y2="52" />
    </g>
</svg>